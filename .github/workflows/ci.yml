name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  verify:
    runs-on: kkldream-jigsaw-puzzle-solver

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: web/yarn.lock

      - name: Install dependencies
        working-directory: web
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Run lint
        working-directory: web
        run: yarn lint

      - name: Build Docker image
        run: |
          docker build \
            --progress=plain \
            -t "jigsaw-puzzle-solver-ci:${{ github.sha }}" \
            -f Dockerfile \
            .
