apiVersion: apps/v1
kind: Deployment
metadata:
  name: jigsaw-puzzle-solver
  labels:
    app: jigsaw-puzzle-solver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jigsaw-puzzle-solver
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: jigsaw-puzzle-solver
    spec:
      containers:
        - name: jigsaw-puzzle-solver
          image: jigsaw-puzzle-solver:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
          envFrom:
            - secretRef:
                name: jigsaw-puzzle-solver-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
